oauth:
  app_token: xapp-fake-socket-mode-token
  bot_token: xoxb-fake-bot-token

configuration:
  admin_user: murtaugh-admin
  debug: false

chat:
  default_agent: default

commands:
  - name: /murtaugh
    description: Entrypoint for Murtaugh commands

workflow-rules:
  startup-ping-pong:
    request_event: interactive
    match:
      type: block_actions
      actions:
        - action_id: ping
    trigger:
      - reply-to-slack:
          template: ping/02-pong.json

# If workflow-rules is omitted entirely, Murtaugh still installs a built-in
# ping button workflow that renders ping/02-pong.json in the original message
# thread.

# Custom link unfurling. Requires the link_shared bot event plus the links:read
# and chat:write scopes, and each match.domain must be registered in the Slack
# app's "App Unfurl Domains" list (max 5) or no link_shared event is delivered.
unfurl-rules:
  github-pr:
    match:
      domain: github.com
      url_pattern: '^https://github\.com/(?P<owner>[^/]+)/(?P<repo>[^/]+)/pull/(?P<number>\d+)'
    unfurl:
      template: unfurl/github-pr.json